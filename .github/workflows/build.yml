name: Build StockSense APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build StockSense Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.44.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      - name: Verify build config
        run: |
          echo "==== STOCKSENSE BUILD $(date '+%Y-%m-%d %H:%M UTC') ===="
          echo "--- pubspec.yaml ---"
          cat pubspec.yaml
          echo "--- Gradle wrapper ---"
          grep distributionUrl android/gradle/wrapper/gradle-wrapper.properties
          echo "--- AGP/Kotlin (now declared in settings.gradle) ---"
          grep -E "com.android.application|kotlin.android" android/settings.gradle
          echo "--- SDK levels ---"
          grep -E "compileSdk|targetSdk|minSdk" android/app/build.gradle
          echo "--- Flutter ---"
          flutter --version

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StockSense-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "==== BUILD SUCCESS ===="
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo "Download: Actions tab → StockSense-APK"
