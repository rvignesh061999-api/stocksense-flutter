name: Build StockSense APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build StockSense Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create project structure
        run: |
          mkdir -p lib/models lib/services lib/screens lib/widgets
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/kotlin/com/stocksense/app
          mkdir -p android/gradle/wrapper

      - name: Write all project files
        run: |
          python3 << 'PYEOF'
          import os, struct, zlib

          def w(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True) if os.path.dirname(path) else None
              open(path, 'w').write(content)

          def wb(path, data):
              os.makedirs(os.path.dirname(path), exist_ok=True) if os.path.dirname(path) else None
              open(path, 'wb').write(data)

          # ── pubspec.yaml ────────────────────────────────────────────────
          w('pubspec.yaml', """name: stocksense
          description: StockSense Trading App
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            flutter_background_service: ^5.1.0
            flutter_local_notifications: ^17.2.2
            http: ^1.2.1
            shared_preferences: ^2.3.2
            cupertino_icons: ^1.0.6
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
          dependency_overrides:
            flutter_background_service_android: ^6.3.1
          """)

          # ── gradle wrapper ───────────────────────────────────────────────
          w('android/gradle/wrapper/gradle-wrapper.properties',
          """distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\\://services.gradle.org/distributions/gradle-8.3-all.zip
          """)

          # ── android/build.gradle ─────────────────────────────────────────
          w('android/build.gradle', """buildscript {
              ext.kotlin_version = '1.9.10'
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.4'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          subprojects { project.evaluationDependsOn(':app') }
          tasks.register("clean", Delete) { delete rootProject.layout.buildDirectory }
          """)

          # ── android/settings.gradle ──────────────────────────────────────
          w('android/settings.gradle', """pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          plugins { id "dev.flutter.flutter-plugin-loader" version "1.0.0" }
          include ":app"
          """)

          # ── android/gradle.properties ────────────────────────────────────
          w('android/gradle.properties',
          """org.gradle.jvmargs=-Xmx4G
          android.useAndroidX=true
          android.enableJetifier=true
          """)

          # ── local.properties ─────────────────────────────────────────────
          import subprocess
          flutter_root = subprocess.check_output(['bash','-c','echo $FLUTTER_ROOT']).decode().strip()
          android_sdk  = subprocess.check_output(['bash','-c','echo $ANDROID_SDK_ROOT']).decode().strip()
          w('android/local.properties', f"flutter.sdk={flutter_root}\nsdk.dir={android_sdk}\n")

          # ── android/app/build.gradle ─────────────────────────────────────
          w('android/app/build.gradle', """plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.stocksense.app"
              compileSdk 34
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
                  coreLibraryDesugaringEnabled true
              }
              kotlinOptions { jvmTarget = '1.8' }
              defaultConfig {
                  applicationId "com.stocksense.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
                  multiDexEnabled true
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          flutter { source '../..' }
          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:1.2.2'
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.10"
              implementation 'androidx.multidex:multidex:2.0.1'
          }
          """)

          # ── AndroidManifest.xml ──────────────────────────────────────────
          w('android/app/src/main/AndroidManifest.xml', """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application android:label="StockSense" android:name="${applicationName}" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name="id.flutter.flutter_background_service.BackgroundService"
                      android:foregroundServiceType="dataSync" android:exported="true"
                      tools:replace="android:exported"/>
                  <receiver android:exported="false" android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationReceiver"/>
                  <receiver android:exported="false" android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationBootReceiver">
                      <intent-filter><action android:name="android.intent.action.BOOT_COMPLETED"/></intent-filter>
                  </receiver>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          """)

          # ── styles.xml ───────────────────────────────────────────────────
          w('android/app/src/main/res/values/styles.xml', """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          """)

          # ── launcher icons (solid green PNG) ─────────────────────────────
          def make_png(size):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
              raw = b''.join(b'\x00' + bytes([0, 180, 80] * size) for _ in range(size))
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')

          for folder, size in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]:
              wb(f'android/app/src/main/res/{folder}/ic_launcher.png', make_png(size))

          # ── MainActivity.kt ───────────────────────────────────────────────
          w('android/app/src/main/kotlin/com/stocksense/app/MainActivity.kt',
          """package com.stocksense.app
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          """)

          # ── lib/constants.dart ────────────────────────────────────────────
          w('lib/constants.dart', """const String APP_VERSION = 'V1.0.0';
          const String SERVER_URL = 'https://stock-sense-server--rvignesh061999.replit.app/api';
          const List<String> ALL_STOCKS = [
            'HDFCBANK','ICICIBANK','KOTAKBANK','AXISBANK','SBIN','BANKBARODA','PNB','INDUSINDBK','YESBANK','FEDERALBNK',
            'CANBK','BAJFINANCE','BAJAJFINSV','MUTHOOTFIN','LICHSGFIN','LICI','SBILIFE','HDFCLIFE',
            'TCS','INFY','WIPRO','HCLTECH','TECHM','LTIM','TATACOMM','MPHASIS','PERSISTENT',
            'RELIANCE','ONGC','IOC','BPCL','COALINDIA','BHARTIARTL','IDEA',
            'TATAMOTORS','MARUTI','BAJAJ-AUTO','EICHERMOT','HEROMOTOCO','TVSMOTOR',
            'TATASTEEL','JSWSTEEL','HINDALCO','VEDL','SAIL',
            'NTPC','POWERGRID','TATAPOWER','ADANIPOWER','TORNTPOWER',
            'ADANIGREEN','RPOWER','SUZLON','IREDA',
            'BEL','BHEL','BEML','HAL','GRSE','MAZDOCK','COCHINSHIP','HBLENGINE',
            'LT','NBCC','HUDCO','ADANIPORTS','ADANIENT','IRFC','RVNL',
            'SUNPHARMA','DRREDDY','CIPLA','APOLLOHOSP','DIVISLAB','BIOCON','AUROPHARMA',
            'ITC','HINDUNILVR','NESTLEIND','BRITANNIA','DABUR','MARICO',
            'ASIANPAINT','TITAN','HAVELLS','VOLTAS','DIXON',
            'ZOMATO','IRCTC','NYKAA','PAYTM','SWIGGY',
          ];
          const int MARKET_OPEN_HOUR=9,MARKET_OPEN_MIN=15;
          const int MARKET_CLOSE_HOUR=15,MARKET_CLOSE_MIN=30;
          const int BEST_ENTRY_HOUR=10,BEST_ENTRY_MIN=0;
          const int EXIT_WARNING_HOUR=11,EXIT_WARNING_MIN=30;
          const int COLOR_GREEN=0xFF00FF88,COLOR_RED=0xFFFF4444;
          const int COLOR_YELLOW=0xFFFFAA00,COLOR_BG=0xFF0A0A0A,COLOR_CARD=0xFF111111;
          const int NOTIF_SCAN_PROGRESS=1,NOTIF_SCAN_COMPLETE=2,NOTIF_REST_TIMER=3;
          """)

          # ── lib/models/signal.dart ────────────────────────────────────────
          w('lib/models/signal.dart', """class StockSignal {
            final String symbol,signal,candle;
            final int confidence;
            final double price,rsi,volRatio;
            final bool emaBullish,aboveVwap,macdBull,extended,sectorWeak;
            final DateTime scannedAt;
            StockSignal({required this.symbol,required this.signal,required this.confidence,
              required this.price,required this.rsi,required this.volRatio,
              required this.emaBullish,required this.aboveVwap,required this.candle,
              required this.macdBull,this.extended=false,this.sectorWeak=false,DateTime? scannedAt})
              :scannedAt=scannedAt??DateTime.now();
            factory StockSignal.fromJson(Map<String,dynamic> j)=>StockSignal(
              symbol:j['symbol']??'',signal:j['signal']??'AVOID',
              confidence:(j['confidence']??0).toInt(),price:(j['price']??0.0).toDouble(),
              rsi:(j['rsi']??0.0).toDouble(),volRatio:(j['volRatio']??0.0).toDouble(),
              emaBullish:j['emaBullish']??false,aboveVwap:j['aboveVwap']??false,
              candle:j['candle']??'',macdBull:j['macdBull']??false,
              extended:j['extended']??false,sectorWeak:j['sectorWeak']??false);
            bool get isBuy=>signal=='BUY';
            bool get isShort=>signal=='SHORT';
            bool get isAvoid=>signal=='AVOID';
            String get signalEmoji=>isBuy?'📈':isShort?'📉':'⚪';
            double get stopLoss=>isBuy?price*0.985:price*1.015;
            double get target=>isBuy?price*1.03:price*0.97;
          }
          """)

          # ── lib/services/api_service.dart ─────────────────────────────────
          w('lib/services/api_service.dart', """import 'dart:convert';
          import 'package:http/http.dart' as http;
          import '../constants.dart';
          import '../models/signal.dart';
          class ApiService {
            static final ApiService _i=ApiService._();
            factory ApiService()=>_i;
            ApiService._();
            Future<Map<String,dynamic>> getStatus() async {
              try {
                final r=await http.get(Uri.parse('\\$SERVER_URL/status')).timeout(const Duration(seconds:10));
                if(r.statusCode==200) return {...json.decode(r.body),'online':true};
                return {'online':false};
              } catch(e){return {'online':false};}
            }
            Future<StockSignal?> scanStock(String symbol,{double capital=10000.0}) async {
              try {
                final r=await http.get(Uri.parse('\\$SERVER_URL/scan?symbol=\\$symbol&capital=\\$capital')).timeout(const Duration(seconds:15));
                if(r.statusCode==200) return StockSignal.fromJson(json.decode(r.body));
                return null;
              } catch(e){return null;}
            }
          }
          """)

          # ── lib/services/notification_service.dart ────────────────────────
          w('lib/services/notification_service.dart', """import 'package:flutter_local_notifications/flutter_local_notifications.dart';
          import '../constants.dart';
          class NotificationService {
            static final NotificationService _i=NotificationService._();
            factory NotificationService()=>_i;
            NotificationService._();
            final _p=FlutterLocalNotificationsPlugin();
            bool _init=false;
            Future<void> init() async {
              if(_init) return;
              await _p.initialize(const InitializationSettings(android:AndroidInitializationSettings('@mipmap/ic_launcher')));
              final ap=_p.resolvePlatformSpecificImplementation<AndroidFlutterLocalNotificationsPlugin>();
              await ap?.createNotificationChannel(const AndroidNotificationChannel('stocksense_scan','Scan Progress',importance:Importance.low,playSound:false,enableVibration:false));
              await ap?.createNotificationChannel(const AndroidNotificationChannel('stocksense_signal','Trade Signals',importance:Importance.high));
              _init=true;
            }
            Future<void> showScanProgress({required int scanned,required int total,required int buys,required int shorts,required int scanNum}) async {
              final pct=total>0?scanned/total:0.0;
              final bar=String.fromCharCodes(List.filled((pct*10).round(),9608))+String.fromCharCodes(List.filled(10-(pct*10).round(),9617));
              await _p.show(NOTIF_SCAN_PROGRESS,'\\u23f1 StockSense \u2014 Scanning...','\\$bar \\$scanned/\\$total\\n\\U0001f7e2 \\$buys BUY  \\U0001f534 \\$shorts SHORT  |  Scan #\\$scanNum',
                NotificationDetails(android:AndroidNotificationDetails('stocksense_scan','Scan Progress',importance:Importance.low,priority:Priority.low,ongoing:true,autoCancel:false,showProgress:true,maxProgress:total,progress:scanned,onlyAlertOnce:true)));
            }
            Future<void> showRestCountdown({required int secondsLeft,required int scanNum,required List<String> topSignals}) async {
              final m=secondsLeft~/60;final s=secondsLeft%60;
              await _p.show(NOTIF_REST_TIMER,'\\u23f3 Next scan in \\${m}m \\${s.toString().padLeft(2,"0")}s','\\${topSignals.take(3).join("  ")}\\nScan #\\$scanNum',
                NotificationDetails(android:AndroidNotificationDetails('stocksense_scan','Scan Progress',importance:Importance.low,priority:Priority.low,ongoing:true,autoCancel:false,onlyAlertOnce:true,
                  actions:[const AndroidNotificationAction('scan_now','\\u26a1 Scan Now',cancelNotification:false),const AndroidNotificationAction('stop_scan','\\u23f9 Stop',cancelNotification:true)])));
            }
            Future<void> showScanComplete({required int scanNum,required int buys,required int shorts,required List<String> topBuys,required List<String> topShorts}) async {
              final buyStr=topBuys.take(2).map((s)=>'\\U0001f7e2 '+s).join('  ');
              final shortStr=topShorts.take(2).map((s)=>'\\U0001f534 '+s).join('  ');
              await _p.show(NOTIF_SCAN_COMPLETE,'Scan #\\$scanNum \u2014 \\${buys+shorts} Signals!',
                '\\$buyStr  \\$shortStr',
                NotificationDetails(android:AndroidNotificationDetails('stocksense_signal','Trade Signals',importance:Importance.high,priority:Priority.high)));
            }
            Future<void> clearAll() async=>await _p.cancelAll();
          }
          """)

          # ── lib/services/scan_service.dart ────────────────────────────────
          w('lib/services/scan_service.dart', """import 'dart:async';
          import 'dart:ui';
          import 'package:flutter/material.dart';
          import 'package:flutter_background_service/flutter_background_service.dart';
          import 'package:flutter_background_service_android/flutter_background_service_android.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import 'api_service.dart';
          import 'notification_service.dart';
          import '../constants.dart';
          import '../models/signal.dart';
          bool _stop=false;
          int _scanN=0;
          @pragma('vm:entry-point')
          void backgroundMain(ServiceInstance svc){
            _stop=false;_scanN=0;
            WidgetsFlutterBinding.ensureInitialized();
            DartPluginRegistrant.ensureInitialized();
            svc.on('stopScan').listen((_){_stop=true;NotificationService().clearAll();});
            svc.on('startScan').listen((_) async{_stop=false;await _runSession(svc);});
          }
          Future<void> _runSession(ServiceInstance svc) async {
            _stop=false;_scanN=0;
            final notif=NotificationService();await notif.init();
            final prefs=await SharedPreferences.getInstance();
            final rest=prefs.getInt('rest_duration')??300;
            final capital=prefs.getDouble('capital')??10591.0;
            while(!_stop){
              _scanN++;
              final results=await _scan(svc,notif,capital,_scanN);
              if(_stop) break;
              final buys=results.where((s)=>s.isBuy).toList();
              final shorts=results.where((s)=>s.isShort).toList();
              await notif.showScanComplete(scanNum:_scanN,buys:buys.length,shorts:shorts.length,
                topBuys:buys.take(3).map((s)=>'\\${s.symbol} \\${s.confidence}%').toList(),
                topShorts:shorts.take(3).map((s)=>'\\${s.symbol} \\${s.confidence}%').toList());
              svc.invoke('scanComplete',{'scanNum':_scanN,'buys':buys.length,'shorts':shorts.length,
                'signals':results.map((s)=>{'symbol':s.symbol,'signal':s.signal,'confidence':s.confidence,'price':s.price,'rsi':s.rsi,'volRatio':s.volRatio}).toList()});
              if(_stop) break;
              await _rest(svc,notif,rest,_scanN,[...buys.take(2).map((s)=>'\\U0001f7e2 \\${s.symbol} \\${s.confidence}%'),...shorts.take(2).map((s)=>'\\U0001f534 \\${s.symbol} \\${s.confidence}%')]);
            }
            await notif.clearAll();
            svc.invoke('sessionStopped',{});
          }
          Future<List<StockSignal>> _scan(ServiceInstance svc,NotificationService notif,double capital,int scanN) async {
            final results=<StockSignal>[];int buys=0,shorts=0;
            for(int i=0;i<ALL_STOCKS.length;i++){
              if(_stop) break;
              final sig=await ApiService().scanStock(ALL_STOCKS[i],capital:capital);
              if(sig!=null){results.add(sig);if(sig.isBuy)buys++;if(sig.isShort)shorts++;}
              if(i==0||i%5==0||i==ALL_STOCKS.length-1){
                await notif.showScanProgress(scanned:i+1,total:ALL_STOCKS.length,buys:buys,shorts:shorts,scanNum:scanN);
                svc.invoke('scanProgress',{'scanned':i+1,'total':ALL_STOCKS.length,'buys':buys,'shorts':shorts,'currentSymbol':ALL_STOCKS[i],'scanNum':scanN});
              }
            }
            return results;
          }
          Future<void> _rest(ServiceInstance svc,NotificationService notif,int total,int scanN,List<String> sigs) async {
            int left=total;
            final c=Completer<void>();
            Timer.periodic(const Duration(seconds:1),(t) async {
              if(_stop){t.cancel();c.complete();return;}
              left--;
              if(left%10==0||left<=5){
                await notif.showRestCountdown(secondsLeft:left,scanNum:scanN,topSignals:sigs);
                svc.invoke('restTick',{'secsLeft':left,'scanNum':scanN});
              }
              if(left<=0){t.cancel();c.complete();}
            });
            await c.future;
          }
          class ScanService {
            static final ScanService _i=ScanService._();
            factory ScanService()=>_i;
            ScanService._();
            final _svc=FlutterBackgroundService();
            Future<void> init() async {
              await _svc.configure(
                androidConfiguration:AndroidConfiguration(onStart:backgroundMain,autoStart:false,isForegroundMode:true,
                  notificationChannelId:'stocksense_scan',initialNotificationTitle:'StockSense',
                  initialNotificationContent:'Ready to scan',foregroundServiceNotificationId:888),
                iosConfiguration:IosConfiguration(autoStart:false,onForeground:backgroundMain));
            }
            Future<void> startScan() async {if(!await _svc.isRunning()) await _svc.startService();_svc.invoke('startScan',{});}
            Future<void> stopScan() async=>_svc.invoke('stopScan',{});
            Stream<Map<String,dynamic>?> get onProgress=>_svc.on('scanProgress');
            Stream<Map<String,dynamic>?> get onScanComplete=>_svc.on('scanComplete');
            Stream<Map<String,dynamic>?> get onRestTick=>_svc.on('restTick');
            Stream<Map<String,dynamic>?> get onStopped=>_svc.on('sessionStopped');
            Future<bool> get isRunning=>_svc.isRunning();
          }
          """)

          # ── lib/widgets/signal_card.dart ──────────────────────────────────
          w('lib/widgets/signal_card.dart', """import 'package:flutter/material.dart';
          import '../models/signal.dart';
          import '../constants.dart';
          class SignalCard extends StatelessWidget {
            final StockSignal signal;
            const SignalCard({super.key,required this.signal});
            @override Widget build(BuildContext ctx){
              final c=signal.isBuy?const Color(COLOR_GREEN):signal.isShort?const Color(COLOR_RED):Colors.grey;
              return Container(margin:const EdgeInsets.only(bottom:10),padding:const EdgeInsets.all(12),
                decoration:BoxDecoration(color:const Color(COLOR_CARD),borderRadius:BorderRadius.circular(8),border:Border.all(color:c.withOpacity(0.3))),
                child:Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
                  Row(children:[Text(signal.signalEmoji,style:const TextStyle(fontSize:16)),const SizedBox(width:8),
                    Text(signal.symbol,style:TextStyle(color:c,fontSize:16,fontWeight:FontWeight.bold)),const SizedBox(width:8),
                    Container(padding:const EdgeInsets.symmetric(horizontal:8,vertical:2),decoration:BoxDecoration(color:c.withOpacity(0.15),borderRadius:BorderRadius.circular(4),border:Border.all(color:c.withOpacity(0.5))),
                      child:Text('\\${signal.signal} \\${signal.confidence}%',style:TextStyle(color:c,fontSize:12,fontWeight:FontWeight.bold))),
                    const Spacer(),Text('\\u20b9\\${signal.price.toStringAsFixed(2)}',style:const TextStyle(color:Colors.white,fontSize:14,fontWeight:FontWeight.bold))]),
                  const SizedBox(height:8),
                  Wrap(spacing:8,runSpacing:4,children:[
                    _i('RSI','\\${signal.rsi.toStringAsFixed(1)}',signal.rsi>50?const Color(COLOR_GREEN):const Color(COLOR_RED)),
                    _i('VOL','\\${signal.volRatio.toStringAsFixed(2)}x',signal.volRatio>=0.9?const Color(COLOR_GREEN):const Color(COLOR_YELLOW)),
